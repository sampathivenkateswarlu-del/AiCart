<!DOCTYPE html>
<html lang="en">
<head>
    <base href="/AiCart/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - AiCart</title>
    <meta name="description" content="Browse our wide range of products on AiCart.">
    <link rel="icon" href="images/aicart.ico.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div id="menu-toggle" class="menu-toggle">&#9776;</div>
            <div class="logo">
                <img src="images/aicart.ico.ico" alt="AiCart Logo" class="logo-icon">
                <span class="logo-text">AiCart</span>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Search for products..." id="search-input">
                <button type="button" id="search-btn">Search</button>
            </div>
            <nav class="nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="categories.html">Categories</a></li>
                    <li><a href="deals.html">Deals</a></li>
                    <li><a href="orders.html">Orders</a></li>
                    <li><a href="cart.html" class="cart-link">Cart <span id="cart-count">0</span></a></li>
                    <li><a href="account.html">Account</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="products-page">
            <div class="container">
                <h1>All Products</h1>
                <div class="filters">
                    <select id="category-filter">
                        <option value="">All Categories</option>
                        <option value="electronics">Electronics</option>
                        <option value="fashion">Fashion</option>
                        <option value="home">Home & Kitchen</option>
                        <option value="beauty">Beauty</option>
                        <option value="sports">Sports</option>
                        <option value="books">Books</option>
                        <option value="accessories">Accessories</option>
                    </select>
                    <select id="price-filter">
                        <option value="">All Prices</option>
                        <option value="0-50">$0 - $50</option>
                        <option value="50-100">$50 - $100</option>
                        <option value="100-200">$100 - $200</option>
                        <option value="200+">$200+</option>
                    </select>
                </div>
                <div class="product-grid" id="product-grid">
                    <!-- Products will be populated by JS -->
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-section">
                    <h4>Company</h4>
                    <ul>
                        <li><a href="about.html">About</a></li>
                        <li><a href="careers.html">Careers</a></li>
                        <li><a href="press.html">Press</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>Customer Support</h4>
                    <ul>
                        <li><a href="help.html">Help Center</a></li>
                        <li><a href="returns.html">Returns</a></li>
                        <li><a href="shipping.html">Shipping</a></li>
                        <li><a href="contact.html">Contact Us</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>Legal</h4>
                    <ul>
                        <li><a href="privacy.html">Privacy Policy</a></li>
                        <li><a href="terms.html">Terms</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>Follow Us</h4>
                    <div class="social-icons">
                        <a href="#"><img src="images/facebook.ico" alt="Facebook"></a>
                        <a href="#"><img src="images/xtwitter.ico" alt="Twitter"></a>
                        <a href="#"><img src="images/Instagram.ico" alt="Instagram"></a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
